            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .manifest {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* Поле ввода */
        .code-input {
            background-color: #000000;
            border: none;
            border-bottom: 2px solid #ffffff;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            padding: 5px;
            text-align: center;
            width: 250px;
            outline: none;
            letter-spacing: 2px;
        }

        /* Эффект мигания нижнего подчеркивания при фокусе */
        .code-input:focus {
            border-bottom: 2px solid #00ff00; /* Становится зеленым при вводе, можно оставить белым */
        }

        /* Кнопка отправки */
        .submit-btn {
            background-color: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 8px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* Сообщения об ошибках или успехе */
        #output-message {
            margin-top: 25px;
            font-size: 14px;
            min-height: 20px;
        }
        
        .error { color: #ff3333; }
        .success { color: #00ff00; }
    </style>
