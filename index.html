<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT 23 - ВХОД</title>
    <style>
        body {
            background-color: #000000;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        pre {
            font-size: 14px;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 5px #00FF00;
        }

        #input-container {
            text-align: center;
        }

        /* Убираем стандартные стили формы, чтобы она не ломала верстку */
        form {
            margin: 0;
            padding: 0;
        }

        #code-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00FF00;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            text-align: center;
            outline: none;
            letter-spacing: 5px;
            width: 300px;
        }

        #response-area {
            margin-top: 30px;
            font-size: 18px;
            min-height: 1.2em;
            max-width: 80%;
            word-wrap: break-word;
            margin-left: auto;
            margin-right: auto;
        }

        .error-text { color: #FF0000; }
        .success-text { color: #00FF00; font-weight: bold; }
        .streamer-text { color: #00FFFF; }
    </style>
</head>
<body>

<pre>
 ____            _           _     ___ _____ 
|  _ \ _ __ ___ (_) ___  ___| |_  |__ \___ / 
| |_) | '__/ _ \| |/ _ \/ __| __|   / / |_ \ 
|  __/| | | (_) | |  __/ (__| |_   / /_ ___) |
|_|   |_|  \___// |\___|\___|\__| |____|____/ 
                |__/                          
</pre>

<div id="input-container">
    <form id="arg-form">
        <input type="text" id="code-input" autofocus maxlength="10" placeholder="[ВВЕДИТЕ КОД]" autocomplete="off">
    </form>
    <div id="response-area"></div>
</div>

<script>
    const form = document.getElementById('arg-form');
    const inputField = document.getElementById('code-input');
    const responseArea = document.getElementById('response-area');

    const _0x53 = ["\x37\x33\x34\x39"]; // "7349"

    const streamerReactions = {
        "basila": "Даже тот самый Питербуржский конь, на котором ты сидел, работает на нас."
    };

    // Теперь слушаем отправку формы, а не отдельные кнопки
    form.addEventListener('submit', function (e) {
        e.preventDefault(); // Отменяем стандартную перезагрузку страницы

        const inputValue = inputField.value.trim();
        const lowerInputValue = inputValue.toLowerCase();
        
        responseArea.innerHTML = ''; 
        responseArea.className = ''; 

        // Проверка на пустой ввод
        if (inputValue === '') return;

        // 1. Проверка на стримеров
        if (streamerReactions[lowerInputValue]) {
            responseArea.innerHTML = streamerReactions[lowerInputValue];
            responseArea.classList.add('streamer-text');
            inputField.value = '';
            return;
        }

        // 2. Проверка правильного кода
        if (btoa(inputValue) === btoa(_0x53[0])) {
            responseArea.innerHTML = "> ДОСТУП РАЗРЕШЕН. ОЖИДАЙТЕ ИНСТРУКЦИЙ.";
            responseArea.classList.add('success-text');
            inputField.disabled = true; 
            inputField.style.borderBottom = "none";
            
            setTimeout(() => {
                inputField.value = "**********";
            }, 1000);
        } else {
            // 3. Ошибка
            responseArea.innerHTML = "> КРИТИЧЕСКАЯ ОШИБКА: НЕВЕРНЫЙ ИДЕНТИФИКАТОР.";
            responseArea.classList.add('error-text');
            
            inputField.style.animation = "shake 0.3s";
            setTimeout(() => inputField.style.animation = "", 300);
            inputField.value = '';
        }
    });

    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
